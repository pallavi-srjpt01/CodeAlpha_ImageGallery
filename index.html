<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="title">My Image Gallery</h1>

  <!-- Filter Buttons -->
  <div class="buttons">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('city')">City</button>
  </div>

  <!-- Gallery -->
  <div class="gallery">

    <div class="image nature">
      <img src="images/img1.jpg" onclick="openLightbox(this.src)">
    </div>

    <div class="image city">
      <img src="images/img2.jpg" onclick="openLightbox(this.src)">
    </div>

    <div class="image nature">
      <img src="images/img3.jpg" onclick="openLightbox(this.src)">
    </div>

    <div class="image city">
      <img src="images/img4.jpg" onclick="openLightbox(this.src)">
    </div>

    <div class="image nature">
      <img src="images/img5.jpg" onclick="openLightbox(this.src)">
    </div>

    <div class="image city">
      <img src="images/img6.jpg" onclick="openLightbox(this.src)">
    </div>

  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <img id="lightbox-img">
  </div>

  <script src="script.js"></script>
</body>
</html>
